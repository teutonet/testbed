scrape_configs:
  - job_name: ipmi-exporter
    static_configs:
      - targets:
{% for host in groups['all'] %}
        - "{{ hostvars[host]['ansible_facts'][hostvars[host]['network_interface']]['ipv4']['address'] }}:{{ ipmi_exporter_port | default('9290') }}"
{% endfor %}
    scrape_interval: 60s
