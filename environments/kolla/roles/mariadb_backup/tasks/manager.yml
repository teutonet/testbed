---
- name: Pull the rclone container image
  community.docker.docker_image_pull:
    name: "{{ mariadb_backup_rclone_image_full }}"

- name: Create directories on manager
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "root"
    group: "root"
    mode: "0750"
  loop:
    - "{{ mariadb_backup_destination_dir_manager }}"
    - "{{ mariadb_backup_config_dir }}"

- name: Render rclone.conf
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: "{{ mariadb_backup_rclone_config_file }}"
    owner: "root"
    group: "root"
    mode: "0600"

- name: Deploy manager orchestrator script
  ansible.builtin.template:
    src: mariadb-backup.sh.j2
    dest: "{{ mariadb_backup_orchestrate_script }}"
    owner: root
    group: root
    mode: "0755"

- name: Deploy systemd service units
  ansible.builtin.template:
    src: systemd-service.j2
    dest: "/etc/systemd/system/mariadb-backup-{{ item.type }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ mariadb_backup_jobs }}"
  notify: Reload systemd

- name: Deploy systemd timer units
  ansible.builtin.template:
    src: systemd-timer.j2
    dest: "/etc/systemd/system/mariadb-backup-{{ item.type }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ mariadb_backup_jobs }}"
  notify: Reload systemd

- name: Reload systemd before toggling timers
  ansible.builtin.meta: flush_handlers

- name: Enable and start active timers
  ansible.builtin.systemd:
    name: "mariadb-backup-{{ item.type }}.timer"
    enabled: true
    state: started
  loop: "{{ mariadb_backup_jobs }}"

- name: Deploy service-container {{ service.name }}
  community.docker.docker_container:
    log_driver: "json-file"
    log_options:
      max-size: "10m"
      max-file: "3"
    name: backup_systemd_exporter
    image: docker.io/prometheuscommunity/systemd-exporter:v0.7.0
    network_mode: host
    privileged: true
    user: root # https://github.com/prometheus-community/smartctl_exporter?tab=readme-ov-file#why-is-root-required-cant-i-add-a-user-to-the-disk-group
    restart_policy: unless-stopped
    pull: "{{ pull_image | default('missing') }}"
    mounts:
      - read_only: true
        source: /var/run/dbus
        target: /var/run/dbus
        type: bind
    command:
      - "--systemd.collector.unit-include=mariadb-backup-.*"
  loop_control:
    loop_var: service
  loop: "{{ node_service_container }}"
